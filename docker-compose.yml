services:
  # 1. Capa de Entrada: API Gateway
  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "8080:80"
    depends_on:
      - order-service
      - payment-service
      - notification-service
    networks:
      - pamvid-network

  # 2. Capa de Servicios: Lógica de negocio
  order-service:
    build: ./order-service
    container_name: order-service
    environment:
      - DATABASE_URL=postgresql://user:pass@db-orders:5432/orders_db
    depends_on:
      - db-orders
      - redis
      - rabbitmq
    networks:
      - pamvid-network

  payment-service:
    build: ./payment-service
    container_name: payment-service
    environment:
      - DATABASE_URL=postgresql://user:pass@db-payments:5432/payments_db
    depends_on:
      - db-payments
      - redis
      - rabbitmq
    networks:
      - pamvid-network

  notification-service:
    build: ./notification-service
    container_name: notification-service
    environment:
      - DATABASE_URL=postgresql://user:pass@db-notifications:5432/notifications_db
    depends_on:
      - db-notifications
      - redis
      - rabbitmq
    networks:
      - pamvid-network

  # 3. Capa de Infraestructura: Mensajería y Caché
  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - pamvid-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "15672:15672" # Panel de control (Admin)
      - "5672:5672"   # Puerto de mensajes
    networks:
      - pamvid-network

  # 4. Capa de Persistencia: Bases de Datos PostgreSQL
  db-orders:
    image: postgres:15
    container_name: db-orders
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    networks:
      - pamvid-network

  db-payments:
    image: postgres:15
    container_name: db-payments
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    networks:
      - pamvid-network

  db-notifications:
    image: postgres:15
    container_name: db-notifications
    environment:
      POSTGRES_DB: notifications_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    networks:
      - pamvid-network

  # 5. Capa Operacional: Monitoreo
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    networks:
      - pamvid-network

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - pamvid-network

# Definición de la Red Global para comunicación interna
networks:
  pamvid-network:
    external: true